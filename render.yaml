services:
  - type: web
    name: wellness-kitchen-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: wellness_kitchen
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CHROMA_PATH
        value: ./chroma_db
